version: '3.8'

services:
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_MODE: 'true'
      CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

  hadoop:
    image: mtsrus/hadoop:hadoop3.3.6-hdfs
    container_name: hadoop
    hostname: hadoop-master
    ports:
      - "9870:9870"  # WebHDFS / UI (Hadoop 3.x uses 9870 instead of 50070)
      - "9864:9864"  # DataNode port (Hadoop 3.x uses 9864 instead of 50075)
      - "9000:9000"  # RPC
    environment:
      - HADOOP_NAMENODE_OPTS=-Xmx512m
      - HADOOP_DATANODE_OPTS=-Xmx512m
    extra_hosts:
      - "hadoop-master:127.0.0.1"
